#---------------------------
# スクリーニング機能の設定
# (高確率型)
#---------------------------
[SCREENING]

# 売買区分(0:買い, 1:売り, 2:両方) ==>「1:売り, 2:両方」は買いポジション最大保持期間が0の場合のみ有効
SCR_SELLBUY = 0

# エントリータイミング(0:当日、1:翌日)
SCR_ENT_TIMING = 0

# 実行モード(0:テスト用、1:本番用)
SCR_EXEC_MODE = 1

#/// 判定処理の有効(1)/無効(0) 設定 ///
# ローソク足判定
SCR_JDG_CAND = 0

# 指標銘柄判定
SCR_JDG_IND = 0

# 25日移動平均線判定
SCR_JDG_MOV = 0

# 長期移動平均線判定
SCR_JDG_MOV_LONG = 0

# 移動平均パーフェクトオーダー判定(移動平均線判定有効時のみ設定有効)
SCR_JDG_MOV_PFCT = 0

# 移動平均押し目判定(移動平均線判定有効時のみ設定有効)
SCR_JDG_MOV_PUSH = 0

# RSI判定
SCR_JDG_RSI = 0

# 短期RSI判定
SCR_JDG_RSI4 = 1

# 短期RSI反転判定(短期RSI判定が有効時のみ設定有効) 0:RSI4反転なしでシグナル、1:RSI4反転したらシグナル
SCR_JDG_RSI4REV = 0

# ボリンジャー判定
SCR_JDG_BOLIN = 0

# MACD判定
SCR_JDG_MACD = 0

# ブレイクアウト判定
SCR_JDG_BRK = 0

# 髭判定
SCR_JDG_BERD = 0

# 2番3番底判定
SCR_JDG_BOTTOM = 0

# 3日目の法則判定 (窓開け陰線⇒陰線⇒陽線)
SCR_JDG_3DAY = 0

# 予約購入時判定(エントリータイミング(1:翌日)選択時にのみ有効)
# 翌日が前日終値より高い場合に購入し、安い場合は購入しない
SCR_JDG_RSVENT = 0

#/// 各判定に使用するパラメータ ///
# 過去何日前までの株価データを使用するか
# 注：(最古)過去4279日とする。 (2010年1月4日開始) これ以前はnullの混ざる銘柄が多い
SCR_PAST_PERIOD = 100

# 買いポジション最大保持期間(-1に設定した場合は翌営業日の寄りで決済)
SCR_SELL_PERIOD = 100

# ブレイクアウト判定期間に使用する値
SCR_BREAK_PERIOD = 7

# ブレイクアウトオフセット。上限を何%超えたか。(1/100で計算)
SCR_BREAK_OFSET = 0.01

# MACDとシグナルの開き
SCR_MACD_OFSET = 5

# 買いシグナルに使用する長期移動平均線(上昇時かつ現在値が長期線より上の時に買)
SCR_LINEAVE = 200

# 買シグナルを出す上限RSI
SCR_RSI_MAX = 70

# RSIの下限値。scr_rsi_perが無効（-1）の時に採用する。
SCR_RSI_BORDER = 30

# RSIの下限を全体の%で決める時の値。-1の時はrsi_borderを使用
SCR_RSI_PER = 55

# RSIの値を何日まで遡ってみるか
SCR_RSI_PERIOD = 14

# 短期(4日)RSIの上限値。(決済判定ポイント （売りの時は100から引いた値を使用する))
SCR_SRSI_HI = 60

# 短期(4日)RSIの下限値。(エントリー判定ポイント （売りの時は100から引いた値を使用する))
SCR_SRSI_LOW = 10

# 決済後、再エントリーまでの休止期間（大暴落対策）
SCR_ENTRY_REST = 0

# 指標銘柄コード
SCR_IND_CODE = 1321

